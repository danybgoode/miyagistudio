<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Miyagi Studio renders SVG, PNG, and JPG icons into premium glassmorphism application icon assets."
    />
    <title>Miyagi Studio</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Glass icon renderer">
        <div class="toolbar">
          <div>
            <h1>Miyagi Studio</h1>
            <p>Generate glass app icons from SVG, PNG, or JPG sources.</p>
          </div>
          <a class="button secondary" href="https://github.com/danybgoode/miyagistudio">GitHub</a>
        </div>

        <div class="panels">
          <section class="preview-panel" aria-label="Icon preview">
            <div class="preview-header">
              <span id="assetName">miyagi-leaf.svg</span>
              <span id="jobStatus">Ready</span>
            </div>
            <div class="icon-preview" id="iconPreview">
              <div class="preview-field"></div>
              <div class="preview-glass"></div>
              <div class="preview-edge"></div>
              <div class="preview-glyph" id="previewGlyph"></div>
              <div class="preview-shine"></div>
              <div class="preview-angular-shine" id="previewAngularShine"></div>
              <div class="preview-grain"></div>
              <div class="preview-sparkle" id="previewSparkle">
                <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                  <path d="M50 0 C50 40, 60 50, 100 50 C60 50, 50 60, 50 100 C50 60, 40 50, 0 50 C40 50, 50 40, 50 0 Z" fill="#ffffff" />
                  <circle cx="50" cy="50" r="10" fill="#ffffff" filter="blur(2px)" />
                </svg>
              </div>
            </div>
          </section>

          <aside class="control-panel" aria-label="Renderer controls">
            <label class="drop-zone" for="assetInput">
              <input id="assetInput" type="file" accept=".svg,.png,.jpg,.jpeg,image/svg+xml,image/png,image/jpeg" />
              <span>Drop SVG, PNG, or JPG</span>
            </label>

            <label>
              Theme
              <select id="themeSelect">
                <option value="crystal-liquid">Crystal liquid</option>
                <option value="liquid-glass">Liquid glass</option>
                <option value="dark-glass">Dark glass</option>
                <option value="frosted-light">Frosted light</option>
                <option value="holographic-subtle">Holographic subtle</option>
              </select>
            </label>

            <fieldset>
              <legend>Lighting</legend>
              <label>
                Sparkle
                <select id="sparklePos">
                  <option value="top-right">Top Right</option>
                  <option value="top-left">Top Left</option>
                  <option value="bottom-right">Bottom Right</option>
                  <option value="bottom-left">Bottom Left</option>
                  <option value="none">None</option>
                </select>
              </label>
              <label><input type="checkbox" id="angularShine" /> Angular shine</label>
            </fieldset>

            <fieldset>
              <legend>Sizes</legend>
              <label><input type="checkbox" name="size" value="64" checked /> 64</label>
              <label><input type="checkbox" name="size" value="128" checked /> 128</label>
              <label><input type="checkbox" name="size" value="256" checked /> 256</label>
              <label><input type="checkbox" name="size" value="512" checked /> 512</label>
              <label><input type="checkbox" name="size" value="1024" checked /> 1024</label>
            </fieldset>

            <label class="scale-control">
              <span>Asset scale <output id="assetScaleValue">56%</output></span>
              <input id="assetScale" type="range" min="40" max="99" value="56" />
            </label>

            <fieldset>
              <legend>Formats</legend>
              <label><input type="checkbox" name="format" value="png" checked /> PNG</label>
              <label><input type="checkbox" name="format" value="svg" checked /> SVG</label>
            </fieldset>

            <button class="button primary" id="generateButton" type="button">Generate assets</button>
            <button class="button secondary" id="downloadAllButton" type="button" disabled>Download ZIP</button>

            <div class="command">
              <span>CLI equivalent</span>
              <code id="commandText">node render.js --theme liquid-glass --sizes 64,128,256,512,1024</code>
            </div>

            <div class="asset-list" id="assetList" aria-live="polite"></div>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="/src/ui.js"></script>
  </body>
</html>
